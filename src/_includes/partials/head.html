<head>

{% include "partials/meta.html" %}

<meta name="theme-color" content="#000">
<meta name="robots" content="index, follow, noodp" />
<script>
(() => {
  const identityTokenPattern = /^(#(?:invite_token|recovery_token|confirmation_token|email_change_token)=)/;

  if (identityTokenPattern.test(window.location.hash) && window.location.pathname !== "/admin/") {
    window.location.replace(`/admin/${window.location.hash}`);
    return;
  }

  try {
    if (window.localStorage.getItem("theme") === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  } catch (error) {
    console.error("Theme preference could not be restored.", error);
  }
})();
</script>

{% if features.blog %}
<link rel="alternate" type="application/rss+xml" href="{{ site.url }}/feed.xml" />
{% endif %}
{% if features.portfolio %}
<link rel="alternate" type="application/rss+xml" href="{{ site.url }}/portfolio/feed.xml" />
{% endif %}
<link rel="stylesheet" href="{{ site.assetPath }}/css/critical.css">
{% if features.blog %}
<link rel="stylesheet" href="{{ site.assetPath }}/css/blog.css">
{% endif %}
{% if features.portfolio %}
<link rel="stylesheet" href="{{ site.assetPath }}/css/portfolio.css">
{% endif %}
{% if page.url == "/" %}
<link rel="stylesheet" href="{{ site.assetPath }}/css/home.css">
{% endif %}
{% if page.url == "/about/" %}
<link rel="stylesheet" href="{{ site.assetPath }}/css/about.css">
{% endif %}

</head>
